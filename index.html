    <script src="https://player.vimeo.com/api/player.js"></script>
    <script>
        const vimeoPlayers = new Map();
        function getVimeoPlayer(iframe) {
            if (!vimeoPlayers.has(iframe)) {
                vimeoPlayers.set(iframe, new Vimeo.Player(iframe));
            }
            return vimeoPlayers.get(iframe);
        }

        const swiper = new Swiper(".mySwiper", {
            slidesPerView: 1, centeredSlides: true, loop: true, speed: 1000, effect: "fade", fadeEffect: { crossFade: true },
            navigation: { nextEl: ".swiper-button-next", prevEl: ".swiper-button-prev" },
            mousewheel: { forceToAxis: true, thresholdDelta: 20 },
            on: {
                slideChangeTransitionEnd: function () {
                    // Pausa tutti i video e riproduci solo quello attivo
                    const allSlides = document.querySelectorAll('.swiper-slide iframe');
                    allSlides.forEach(iframe => {
                        try {
                            if (iframe.src.includes('vimeo.com')) {
                                const player = getVimeoPlayer(iframe);
                                player.pause().catch(()=>{});
                            }
                        } catch(e) {}
                    });
                    
                    const activeSlide = document.querySelector('.swiper-slide-active iframe');
                    if (activeSlide && activeSlide.src.includes('vimeo.com')) {
                        try {
                            const player = getVimeoPlayer(activeSlide);
                            player.play().catch(()=>{});
                        } catch(e) {}
                    }
                }
            }
        });

        // Intersection Observer per mettere in pausa il carosello dei loghi se non è visibile
        const marqueeTrack = document.querySelector('.marquee-track');
        if (marqueeTrack) {
            const marqueeObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        marqueeTrack.classList.remove('paused');
                    } else {
                        marqueeTrack.classList.add('paused');
                    }
                });
            }, { threshold: 0 });
            marqueeObserver.observe(marqueeTrack);
        }
    </script>
